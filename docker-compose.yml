services:
  otslog-web:
    image: otslog-web:latest
    container_name: otslog-web
    restart: unless-stopped
    ports:
      - "3777:3777"
    environment:
      - CAMERAS=${CAMERAS}
      - CAM01_NAME=${CAM01_NAME}
      - CAM01_HLS_URL=${CAM01_HLS_URL}
      - CAM01_RTSP_URL=${CAM01_RTSP_URL}
      - CAM02_NAME=${CAM02_NAME}
      - CAM02_HLS_URL=${CAM02_HLS_URL}
      - CAM02_RTSP_URL=${CAM02_RTSP_URL}
    volumes:
      - segments:/data/segments
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  segments:
