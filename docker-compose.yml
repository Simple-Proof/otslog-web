services:
  otslog-web:
    image: otslog-web:latest
    container_name: otslog-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3777:3777"
    environment:
      - CAMERAS=${CAMERAS}
      - CAM01_NAME=${CAM01_NAME}
      - CAM01_HLS_URL=${CAM01_HLS_URL}
      - CAM01_RTSP_URL=${CAM01_RTSP_URL}
      - CAM02_NAME=${CAM02_NAME}
      - CAM02_HLS_URL=${CAM02_HLS_URL}
      - CAM02_RTSP_URL=${CAM02_RTSP_URL}
    volumes:
      - segments:/data/segments
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - otslog-web

volumes:
  segments:
  caddy_data:
  caddy_config:
